<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="Icon.png"/>
  <title>Rescue Mesh Portal - Register Device</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    body {
      background: #f4f7fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .main-card {
      max-width: 1150px;
      margin: 30px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }

    .top-bar {
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      color: white;
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .top-bar h2 {
      margin: 0;
      font-weight: 900;
    }

    .content-wrap {
      padding: 24px;
    }

    .status-box {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .status-success { background: #d1e7dd; color: #0f5132; }
    .status-error { background: #f8d7da; color: #842029; }
    .status-info { background: #cff4fc; color: #055160; }

    .btn-primary {
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      border: none;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #dbe4f0;
      margin-top: 10px;
    }

    .hidden {
      display: none !important;
    }

    .preview-box {
      background: #f8fbff;
      border: 1px solid #e6eefc;
      border-radius: 12px;
      padding: 14px;
    }

    .preview-box p:last-child {
      margin-bottom: 0;
    }

    .form-label {
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="main-card">
  <div class="top-bar">
    <h2><i class="bi bi-pencil-square me-2"></i>Register Device</h2>
    <div class="d-flex gap-2 flex-wrap">
      <a href="index.html" class="btn btn-light btn-sm">Login</a>
      <button class="btn btn-outline-light btn-sm" id="btnLogout">Logout</button>
    </div>
  </div>

  <div class="content-wrap">
    <div id="statusArea"></div>

    <div class="mb-3">
      <b>User:</b> <span id="currentUserEmail">-</span>
    </div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Device Key</label>
            <input type="text" id="deviceKey" class="form-control" placeholder="Enter or scan device key">
          </div>

          <div class="col-md-6">
            <label class="form-label">Device Label</label>
            <input type="text" id="deviceLabel" class="form-control" placeholder="Node label">
          </div>

          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" id="ownerName" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">National ID</label>
            <input type="text" id="nationalId" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Mobile Number</label>
            <input type="text" id="mobileNumber" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Family Members</label>
            <input type="number" id="familyMembers" class="form-control" min="1">
          </div>

          <div class="col-md-6">
            <label class="form-label">Address</label>
            <input type="text" id="address" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">District / Area</label>
            <input type="text" id="district" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Emergency Contact Name</label>
            <input type="text" id="emergencyContactName" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Emergency Contact Number</label>
            <input type="text" id="emergencyContactNumber" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Latitude</label>
            <input type="text" id="homeLatitude" class="form-control">
          </div>

          <div class="col-md-6">
            <label class="form-label">Longitude</label>
            <input type="text" id="homeLongitude" class="form-control">
          </div>

          <div class="col-12">
            <label class="form-label">Notes</label>
            <textarea id="notes" class="form-control" rows="3"></textarea>
          </div>

          <div class="col-12 d-flex gap-2 flex-wrap">
            <button class="btn btn-outline-primary" id="btnGetLocation">
              <i class="bi bi-geo-alt me-1"></i>Fetch Current Location
            </button>
            <button class="btn btn-outline-success" id="btnStartQR">
              <i class="bi bi-qr-code-scan me-1"></i>Scan QR
            </button>
            <button class="btn btn-outline-danger hidden" id="btnStopQR">Stop Scan</button>
            <button class="btn btn-primary" id="btnSaveRegistration">
              <i class="bi bi-save me-1"></i>Save Registration
            </button>
            <button class="btn btn-outline-secondary" id="btnClearForm">Clear</button>
          </div>

          <div class="col-12">
            <div id="reader" class="hidden"></div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="preview-box">
          <h5>Preview</h5>
          <p><b>Key:</b> <span id="previewKey">-</span></p>
          <p><b>Name:</b> <span id="previewName">-</span></p>
          <p><b>Mobile:</b> <span id="previewMobile">-</span></p>
          <p><b>Members:</b> <span id="previewMembers">-</span></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="border-radius: 16px; overflow: hidden;">
      <div class="modal-header" style="background: linear-gradient(90deg, #6a11cb, #2575fc); color: white;">
        <h5 class="modal-title">
          <i class="bi bi-check-circle-fill me-2"></i>Registration Completed
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body text-center p-4">
        <div style="font-size: 72px; color: #198754; margin-bottom: 10px;">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <h4 class="text-success mb-3">Successfully Registered</h4>
        <p class="mb-3">The device details have been saved successfully.</p>

        <div class="text-start border rounded-3 p-3" style="background:#f8fbff;">
          <p class="mb-2"><b>Device Key:</b> <span id="modalShowKey">-</span></p>
          <p class="mb-2"><b>Owner Name:</b> <span id="modalShowName">-</span></p>
          <p class="mb-0"><b>Mobile Number:</b> <span id="modalShowMobile">-</span></p>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" id="btnRegisterAnother" data-bs-dismiss="modal">
          Register Another
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import {
    getAuth,
    onAuthStateChanged,
    signOut
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzrKD4IjHiaYvpn5jgr5JcbFNyssX6aUU",
    authDomain: "floodrescue-f062a.firebaseapp.com",
    databaseURL: "https://floodrescue-f062a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "floodrescue-f062a",
    storageBucket: "floodrescue-f062a.firebasestorage.app",
    messagingSenderId: "143056819050",
    appId: "1:143056819050:web:ac7be693be8306d41ecb13"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const statusArea = document.getElementById("statusArea");
  const currentUserEmail = document.getElementById("currentUserEmail");

  const deviceKey = document.getElementById("deviceKey");
  const deviceLabel = document.getElementById("deviceLabel");
  const ownerName = document.getElementById("ownerName");
  const nationalId = document.getElementById("nationalId");
  const mobileNumber = document.getElementById("mobileNumber");
  const familyMembers = document.getElementById("familyMembers");
  const address = document.getElementById("address");
  const district = document.getElementById("district");
  const emergencyContactName = document.getElementById("emergencyContactName");
  const emergencyContactNumber = document.getElementById("emergencyContactNumber");
  const homeLatitude = document.getElementById("homeLatitude");
  const homeLongitude = document.getElementById("homeLongitude");
  const notes = document.getElementById("notes");

  const previewKey = document.getElementById("previewKey");
  const previewName = document.getElementById("previewName");
  const previewMobile = document.getElementById("previewMobile");
  const previewMembers = document.getElementById("previewMembers");

  const btnGetLocation = document.getElementById("btnGetLocation");
  const btnSaveRegistration = document.getElementById("btnSaveRegistration");
  const btnClearForm = document.getElementById("btnClearForm");
  const btnStartQR = document.getElementById("btnStartQR");
  const btnStopQR = document.getElementById("btnStopQR");
  const readerDiv = document.getElementById("reader");
  const btnLogout = document.getElementById("btnLogout");
  const btnRegisterAnother = document.getElementById("btnRegisterAnother");

  let qrScanner = null;

  function showStatus(message, type = "info") {
    const cls =
      type === "success" ? "status-success" :
      type === "error" ? "status-error" : "status-info";

    statusArea.innerHTML = `<div class="status-box ${cls}">${message}</div>`;
  }

  function updatePreview() {
    previewKey.textContent = deviceKey.value.trim() || "-";
    previewName.textContent = ownerName.value.trim() || "-";
    previewMobile.textContent = mobileNumber.value.trim() || "-";
    previewMembers.textContent = familyMembers.value.trim() || "-";
  }

  [deviceKey, ownerName, mobileNumber, familyMembers].forEach(el => {
    el.addEventListener("input", updatePreview);
  });

  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = "index.html";
      return;
    }
    currentUserEmail.textContent = user.email || "-";
  });

  btnLogout.addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "index.html";
  });

  btnGetLocation.addEventListener("click", () => {
    if (!navigator.geolocation) {
      showStatus("Geolocation is not supported in this browser.", "error");
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (position) => {
        homeLatitude.value = position.coords.latitude;
        homeLongitude.value = position.coords.longitude;
        showStatus("Location fetched successfully.", "success");
      },
      (error) => {
        showStatus(`Location fetch failed: ${error.message}`, "error");
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });

  btnClearForm.addEventListener("click", () => {
    [
      deviceKey, deviceLabel, ownerName, nationalId, mobileNumber,
      familyMembers, address, district, emergencyContactName,
      emergencyContactNumber, homeLatitude, homeLongitude, notes
    ].forEach(el => el.value = "");
    updatePreview();
    showStatus("Form cleared.", "info");
  });

  function extractKeyFromQR(decodedText) {
    try {
      const parsed = JSON.parse(decodedText);
      return (parsed.node_key || parsed.deviceKey || parsed.key || "").trim();
    } catch (_) {
      return decodedText.trim();
    }
  }

  async function stopQRScanner() {
    if (qrScanner) {
      try {
        await qrScanner.stop();
        await qrScanner.clear();
      } catch (_) {}
      qrScanner = null;
    }
    readerDiv.classList.add("hidden");
    btnStopQR.classList.add("hidden");
    btnStartQR.classList.remove("hidden");
  }

  btnStartQR.addEventListener("click", async () => {
    try {
      readerDiv.classList.remove("hidden");
      btnStopQR.classList.remove("hidden");
      btnStartQR.classList.add("hidden");

      qrScanner = new Html5Qrcode("reader");
      await qrScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 220 },
        async (decodedText) => {
          const key = extractKeyFromQR(decodedText);
          if (!key) {
            showStatus("Invalid QR code.", "error");
            return;
          }

          deviceKey.value = key;
          updatePreview();
          showStatus(`QR scanned successfully. Key: ${key}`, "success");
          await stopQRScanner();
        },
        () => {}
      );
    } catch (err) {
      showStatus(`QR scanner failed: ${err.message}`, "error");
      await stopQRScanner();
    }
  });

  btnStopQR.addEventListener("click", async () => {
    await stopQRScanner();
  });

  btnSaveRegistration.addEventListener("click", async () => {
  const user = auth.currentUser;
  if (!user) {
    showStatus("Please log in first.", "error");
    return;
  }

  const key = deviceKey.value.trim();

  if (!key) {
    showStatus("Device key is required.", "error");
    return;
  }

  if (!ownerName.value.trim()) {
    showStatus("Owner name is required.", "error");
    return;
  }

  if (!mobileNumber.value.trim()) {
    showStatus("Mobile number is required.", "error");
    return;
  }

  if (!familyMembers.value.trim()) {
    showStatus("Family members count is required.", "error");
    return;
  }

  try {
    const docRef = doc(db, "registered_devices", key);
    const existingSnap = await getDoc(docRef);

    // Block duplicate registration
    if (existingSnap.exists()) {
      showStatus("This device key is already registered and cannot be registered again.", "error");
      return;
    }

    const payload = {
      node_key: key,
      deviceLabel: deviceLabel.value.trim(),
      ownerName: ownerName.value.trim(),
      nationalId: nationalId.value.trim(),
      mobileNumber: mobileNumber.value.trim(),
      familyMembers: Number(familyMembers.value.trim() || 0),
      address: address.value.trim(),
      district: district.value.trim(),
      emergencyContactName: emergencyContactName.value.trim(),
      emergencyContactNumber: emergencyContactNumber.value.trim(),
      homeLatitude: homeLatitude.value.trim() === "" ? null : Number(homeLatitude.value),
      homeLongitude: homeLongitude.value.trim() === "" ? null : Number(homeLongitude.value),
      notes: notes.value.trim(),
      isActive: true,
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp(),
      registeredByUid: user.uid,
      registeredByEmail: user.email || ""
    };

    await setDoc(docRef, payload);

    document.getElementById("modalShowKey").textContent = key;
    document.getElementById("modalShowName").textContent = ownerName.value.trim();
    document.getElementById("modalShowMobile").textContent = mobileNumber.value.trim();

    const successModal = new bootstrap.Modal(document.getElementById("successModal"));
    successModal.show();

    showStatus("Device registration saved successfully.", "success");
  } catch (err) {
    showStatus(`Saving registration failed: ${err.message}`, "error");
  }
});

  btnRegisterAnother.addEventListener("click", () => {
    [
      deviceKey, deviceLabel, ownerName, nationalId, mobileNumber,
      familyMembers, address, district, emergencyContactName,
      emergencyContactNumber, homeLatitude, homeLongitude, notes
    ].forEach(el => el.value = "");

    updatePreview();
    showStatus("You can register another device now.", "info");
  });

  updatePreview();
</script>

</body>
</html>
