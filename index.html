<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rescue Mesh Portal - Login</title>
  <link rel="icon" type="image/png" href="Icon.png"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body {
      background: #f4f7fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .auth-card {
      max-width: 900px;
      margin: 60px auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.12);
      overflow: hidden;
    }
    .top-bar {
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      color: white;
      padding: 24px;
    }
    .top-bar h2 {
      margin: 0;
      font-weight: 900;
    }
    .content-wrap {
      padding: 24px;
    }
    .status-box {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-weight: 500;
    }
    .status-success { background: #d1e7dd; color: #0f5132; }
    .status-error { background: #f8d7da; color: #842029; }
    .btn-primary {
      background: linear-gradient(90deg, #6a11cb, #2575fc);
      border: none;
    }
  </style>
</head>
<body>

<div class="auth-card">
  <div class="top-bar">
    <h2><i class="bi bi-shield-check me-2"></i>Rescue Mesh Registration Portal</h2>
  </div>

  <div class="content-wrap">
    <div id="statusArea"></div>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="border rounded-3 p-3 h-100">
          <h4 class="mb-3">Email Login</h4>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="loginEmail" class="form-control" placeholder="Enter email">
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-control" placeholder="Enter password">
          </div>

          <div class="d-flex gap-2 flex-wrap">
            <button class="btn btn-primary" id="btnLoginEmail">
              <i class="bi bi-box-arrow-in-right me-1"></i>Login
            </button>
            <button class="btn btn-outline-primary" id="btnRegisterEmail">
              <i class="bi bi-person-plus me-1"></i>Create Account
            </button>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="border rounded-3 p-3 h-100">
          <h4 class="mb-3">Google Login</h4>
          <button class="btn btn-danger" id="btnGoogleLogin">
            <i class="bi bi-google me-1"></i>Sign in with Google
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
  import {
    getAuth,
    GoogleAuthProvider,
    signInWithPopup,
    signInWithEmailAndPassword,
    createUserWithEmailAndPassword,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBzrKD4IjHiaYvpn5jgr5JcbFNyssX6aUU",
    authDomain: "floodrescue-f062a.firebaseapp.com",
    databaseURL: "https://floodrescue-f062a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "floodrescue-f062a",
    storageBucket: "floodrescue-f062a.firebasestorage.app",
    messagingSenderId: "143056819050",
    appId: "1:143056819050:web:ac7be693be8306d41ecb13"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  const statusArea = document.getElementById("statusArea");
  const loginEmail = document.getElementById("loginEmail");
  const loginPassword = document.getElementById("loginPassword");

  function showStatus(message, type = "error") {
    const cls = type === "success" ? "status-success" : "status-error";
    statusArea.innerHTML = `<div class="status-box ${cls}">${message}</div>`;
  }

  async function upsertPortalUser(user) {
    await setDoc(doc(db, "portal_users", user.uid), {
      uid: user.uid,
      email: user.email || "",
      displayName: user.displayName || "",
      providerId: user.providerData?.[0]?.providerId || "",
      lastLoginAt: serverTimestamp(),
      createdOrUpdatedAt: serverTimestamp()
    }, { merge: true });
  }

  document.getElementById("btnLoginEmail").addEventListener("click", async () => {
    statusArea.innerHTML = "";
    try {
      const cred = await signInWithEmailAndPassword(
        auth,
        loginEmail.value.trim(),
        loginPassword.value
      );
      await upsertPortalUser(cred.user);
      window.location.href = "register.html";
    } catch (err) {
      showStatus(`Login failed: ${err.message}`);
    }
  });

  document.getElementById("btnRegisterEmail").addEventListener("click", async () => {
    statusArea.innerHTML = "";
    try {
      const cred = await createUserWithEmailAndPassword(
        auth,
        loginEmail.value.trim(),
        loginPassword.value
      );
      await upsertPortalUser(cred.user);
      window.location.href = "register.html";
    } catch (err) {
      showStatus(`Account creation failed: ${err.message}`);
    }
  });

  document.getElementById("btnGoogleLogin").addEventListener("click", async () => {
    statusArea.innerHTML = "";
    try {
      const result = await signInWithPopup(auth, googleProvider);
      await upsertPortalUser(result.user);
      window.location.href = "register.html";
    } catch (err) {
      showStatus(`Google login failed: ${err.message}`);
    }
  });

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        await upsertPortalUser(user);
        window.location.href = "register.html";
      } catch (_) {}
    }
  });
</script>

</body>
</html>
